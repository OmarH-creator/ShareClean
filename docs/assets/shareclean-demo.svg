<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">ShareClean terminal demo</title>
  <desc id="desc">A terminal-style demo showing ShareClean redacting secrets from a log before sharing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="18" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="54" y="48" width="852" height="444" rx="14" fill="#0f172a" stroke="#334155"/>
    <rect x="54" y="48" width="852" height="42" rx="14" fill="#111827"/>
    <circle cx="78" cy="69" r="6" fill="#ef4444"/>
    <circle cx="98" cy="69" r="6" fill="#f59e0b"/>
    <circle cx="118" cy="69" r="6" fill="#22c55e"/>
    <text x="144" y="74" fill="#94a3b8" font-family="Consolas, Menlo, monospace" font-size="14">shareclean demo</text>

    <text x="78" y="124" fill="#38bdf8" font-family="Consolas, Menlo, monospace" font-size="18">$</text>
    <text x="100" y="124" fill="#e5e7eb" font-family="Consolas, Menlo, monospace" font-size="18">cat app.log | shareclean --report</text>

    <text x="78" y="170" fill="#94a3b8" font-family="Consolas, Menlo, monospace" font-size="17">2026-07-01 INFO  user=user@example.com</text>
    <text x="78" y="204" fill="#94a3b8" font-family="Consolas, Menlo, monospace" font-size="17">2026-07-01 DEBUG password=fake-secret-value</text>
    <text x="78" y="238" fill="#94a3b8" font-family="Consolas, Menlo, monospace" font-size="17">2026-07-01 DEBUG postgresql://app:fake-pass@db/app</text>

    <path d="M78 270H882" stroke="#334155" stroke-width="1"/>

    <text x="78" y="312" fill="#22c55e" font-family="Consolas, Menlo, monospace" font-size="17">2026-07-01 INFO  user=[EMAIL REDACTED]</text>
    <text x="78" y="346" fill="#22c55e" font-family="Consolas, Menlo, monospace" font-size="17">2026-07-01 DEBUG password=[REDACTED]</text>
    <text x="78" y="380" fill="#22c55e" font-family="Consolas, Menlo, monospace" font-size="17">2026-07-01 DEBUG postgresql://app:[REDACTED]@db/app</text>

    <rect x="78" y="414" width="358" height="40" rx="8" fill="#172554" stroke="#1d4ed8"/>
    <text x="98" y="439" fill="#bfdbfe" font-family="Consolas, Menlo, monospace" font-size="16">3 replacement(s) made.</text>

    <rect x="486" y="414" width="336" height="40" rx="8" fill="#052e16" stroke="#16a34a"/>
    <text x="506" y="439" fill="#bbf7d0" font-family="Consolas, Menlo, monospace" font-size="16">No secrets are printed in reports.</text>
  </g>
</svg>
