name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python files
        run: python -m compileall -q src tests

      - name: Verify CLI version
        run: python -m shareclean --version

  build:
    name: Build release distributions once
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Verify release tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          normalized = tag[1:] if tag.startswith("v") else tag
          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if normalized != version:
              raise SystemExit(f"release tag {tag!r} does not match package version {version!r}")
          PY
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source and wheel distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Smoke install built wheel
        run: |
          VERSION="${RELEASE_TAG#v}"
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          shareclean --version | grep "${VERSION}"
          shareclean config show
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Upload release distributions
        uses: actions/upload-artifact@v5
        with:
          name: shareclean-dist
          path: dist/*

  publish-testpypi:
    name: Publish distributions to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/shareclean
    permissions:
      id-token: write

    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v8
        with:
          name: shareclean-dist
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke-test-testpypi:
    name: Smoke install from TestPyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Pipx install exact release from TestPyPI
        run: |
          VERSION="${RELEASE_TAG#v}"
          python -m pip install --upgrade pip pipx
          export PATH="$HOME/.local/bin:$PATH"
          for attempt in 1 2 3 4 5; do
            if python -m pipx install \
              --index-url https://test.pypi.org/simple/ \
              --pip-args="--extra-index-url https://pypi.org/simple/" \
              "shareclean==${VERSION}"; then
              break
            fi
            if [ "$attempt" = "5" ]; then
              exit 1
            fi
            sleep 20
          done
          shareclean --version | grep "${VERSION}"
          shareclean config show
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

  publish-pypi:
    name: Publish distributions to PyPI
    needs: smoke-test-testpypi
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/shareclean
    permissions:
      id-token: write

    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v8
        with:
          name: shareclean-dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
