name: Detection issue
description: Report a false positive, false negative, or context-preservation issue.
title: "[Detection]: "
labels:
  - detection
body:
  - type: markdown
    attributes:
      value: |
        Use fake examples only. Do not paste real secrets, private logs, customer data, or credentials.
  - type: dropdown
    id: issue-kind
    attributes:
      label: Issue type
      options:
        - False positive
        - False negative
        - Redacted too much context
        - Redacted too little context
    validations:
      required: true
  - type: textarea
    id: fake-input
    attributes:
      label: Fake input
      render: text
      placeholder: "api_key=fake-api-key-12345"
    validations:
      required: true
  - type: textarea
    id: current-output
    attributes:
      label: Current ShareClean output
      render: text
    validations:
      required: true
  - type: textarea
    id: expected-output
    attributes:
      label: Expected output
      render: text
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
